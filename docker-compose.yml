version: '3.8'

services:
  # Actian VectorAI DB — Official Beta Image
  vectorai-db:
    image: williamimoh/actian-vectorai-db:latest
    ports:
      - "50051:50051"
    volumes:
      - vectorai-data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - VECTORAI_HOST=vectorai-db
      - VECTORAI_PORT=50051
      - DEMO_MODE=false
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      - vectorai-db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vectorai-data:
